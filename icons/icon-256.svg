<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="256" height="256" fill="url(#grad)" rx="40" filter="url(#shadow)"/>
  
  <!-- 装饰元素 -->
  <circle cx="60" cy="60" r="15" fill="white" opacity="0.15"/>
  <circle cx="220" cy="80" r="12" fill="white" opacity="0.1"/>
  <circle cx="240" cy="200" r="18" fill="white" opacity="0.12"/>
  
  <!-- 分发箭头图案 -->
  <g opacity="0.3">
    <path d="M 80 120 L 128 100 L 128 140 Z" fill="white"/>
    <path d="M 140 130 L 180 110 L 180 150 Z" fill="white"/>
    <path d="M 200 140 L 230 120 L 230 160 Z" fill="white"/>
  </g>
  
  <!-- 主要文字 -->
  <text x="128" y="190" font-size="120" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">爱</text>
  
  <!-- 副文字 -->
  <text x="200" y="220" font-size="32" font-weight="600" fill="white" opacity="0.9" font-family="Arial, sans-serif" text-anchor="middle">贝壳</text>
</svg>