<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>文章同步助手</title><link rel="stylesheet" href="styles.css"></head><body><main class="popup"><h1>文章同步助手</h1><p class="lede">基于爱贝壳内容同步流程，帮你把一篇文章整理成多平台发布包。</p><label>文章标题<input id="title" placeholder="例如：一键全网分发的内容运营方法"></label><label>正文 / Markdown<textarea id="content" placeholder="粘贴文章正文，支持 Markdown。"></textarea></label><label>目标读者<input id="audience" placeholder="自媒体人、企业新媒体运营、技术博主…"></label><label>核心关键词<input id="keywords" placeholder="多平台分发, 内容同步, 自媒体效率"></label><section class="platforms"><label><input type="checkbox" value="wechat" checked> 公众号</label><label><input type="checkbox" value="zhihu" checked> 知乎</label><label><input type="checkbox" value="xiaohongshu" checked> 小红书</label><label><input type="checkbox" value="toutiao" checked> 头条号</label><label><input type="checkbox" value="juejin"> 掘金/CSDN</label><label><input type="checkbox" value="medium"> Medium</label></section><div class="actions"><button id="run">生成发布包</button><button id="copy">复制结果</button><button id="options">设置</button></div><p id="status"></p><div id="results"></div></main><script type="module" src="popup.js"></script></body></html>
